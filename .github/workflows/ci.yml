name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install Linux Tk libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes python3-tk

      - name: Install test tools
        run: python -m pip install --disable-pip-version-check -r requirements-dev.lock

      - name: Resolve locked runtime dependencies
        run: python -m pip install --disable-pip-version-check --dry-run -r requirements.lock

      - name: Check Python syntax
        run: >-
          python -m py_compile
          pyOSgui.py pyOScli.py pyos_config.py pyos_auth.py pyos_updater.py setup.py

      - name: Check release-blocking lint rules
        run: python -m ruff check .

      - name: Run unit tests
        run: python -m pytest

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Install audit tool
        run: python -m pip install --disable-pip-version-check -r requirements-dev.lock

      - name: Audit locked runtime dependencies
        run: python -m pip_audit --requirement requirements.lock

  release:
    name: Signed Windows release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - dependency-audit
    runs-on: windows-latest
    timeout-minutes: 45
    environment: release
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-build.lock

      - name: Resolve release versions
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          if ($env:GITHUB_REF_NAME -notmatch '^v(?<version>\d+\.\d+\.\d+(?:\.\d+)?)$') {
              throw "Release tags must be v followed by three or four numeric components."
          }
          $ProductVersion = $Matches.version
          $VersionParts = @($ProductVersion.Split('.'))
          while ($VersionParts.Count -lt 4) {
              $VersionParts += "0"
          }
          "PYOS_FILE_VERSION=$($VersionParts -join '.')" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PYOS_PRODUCT_VERSION=$ProductVersion" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Import protected signing certificate
        id: signing-certificate
        shell: pwsh
        env:
          PYOS_SIGNING_PFX_BASE64: ${{ secrets.PYOS_SIGNING_PFX_BASE64 }}
          PYOS_SIGNING_PFX_PASSWORD: ${{ secrets.PYOS_SIGNING_PFX_PASSWORD }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:PYOS_SIGNING_PFX_BASE64)) {
              throw "The PYOS_SIGNING_PFX_BASE64 release secret is required."
          }
          if ([string]::IsNullOrWhiteSpace($env:PYOS_SIGNING_PFX_PASSWORD)) {
              throw "The PYOS_SIGNING_PFX_PASSWORD release secret is required."
          }

          $PfxPath = Join-Path $env:RUNNER_TEMP "pyos-release-signing.pfx"
          $Imported = @()
          try {
              try {
                  $PfxBytes = [Convert]::FromBase64String($env:PYOS_SIGNING_PFX_BASE64)
              } catch {
                  throw "PYOS_SIGNING_PFX_BASE64 is not valid base64."
              }
              if ($PfxBytes.Length -eq 0) {
                  throw "PYOS_SIGNING_PFX_BASE64 decoded to an empty file."
              }
              [IO.File]::WriteAllBytes($PfxPath, $PfxBytes)
              $Password = ConvertTo-SecureString $env:PYOS_SIGNING_PFX_PASSWORD `
                  -AsPlainText -Force
              $Imported = @(Import-PfxCertificate -FilePath $PfxPath `
                  -CertStoreLocation Cert:\CurrentUser\My -Password $Password)
              $CodeSigningOid = "1.3.6.1.5.5.7.3.3"
              $SigningCertificates = @($Imported | Where-Object {
                  $_.HasPrivateKey -and @($_.EnhancedKeyUsageList | Where-Object {
                      $_.ObjectId.Value -eq $CodeSigningOid
                  }).Count -gt 0
              })
              if ($SigningCertificates.Count -ne 1) {
                  throw "The PFX must contain exactly one private code-signing certificate."
              }
              $Thumbprint = ($SigningCertificates[0].Thumbprint -replace '\s', '').ToUpperInvariant()
              if ($Thumbprint -notmatch '^[0-9A-F]{40}$') {
                  throw "The imported signing certificate has an invalid SHA-1 thumbprint."
              }
              "thumbprint=$Thumbprint" |
                  Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } catch {
              foreach ($Certificate in $Imported) {
                  if ($Certificate.Thumbprint -match '^[0-9A-Fa-f]{40}$') {
                      Remove-Item -LiteralPath `
                          "Cert:\CurrentUser\My\$($Certificate.Thumbprint)" `
                          -Force -ErrorAction SilentlyContinue
                  }
              }
              throw
          } finally {
              Remove-Item -LiteralPath $PfxPath -Force -ErrorAction SilentlyContinue
          }

      - name: Install locked build environment
        run: |
          python -m pip install --disable-pip-version-check -r requirements-build.lock
          python -m pip check

      - name: Embed signer trust in ephemeral source
        shell: pwsh
        env:
          PYOS_SIGNING_THUMBPRINT: ${{ steps.signing-certificate.outputs.thumbprint }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          if ($env:PYOS_SIGNING_THUMBPRINT -notmatch '^[0-9A-F]{40}$') {
              throw "A valid imported signing-certificate thumbprint is required."
          }
          $UpdaterPath = Join-Path $env:GITHUB_WORKSPACE "pyos_updater.py"
          $Source = [IO.File]::ReadAllText($UpdaterPath)
          $Marker = "TRUSTED_AUTHENTICODE_THUMBPRINTS = frozenset()"
          if ([regex]::Matches($Source, [regex]::Escape($Marker)).Count -ne 1) {
              throw "The updater signer-trust marker is missing or ambiguous."
          }
          $Replacement = 'TRUSTED_AUTHENTICODE_THUMBPRINTS = frozenset({"' +
              $env:PYOS_SIGNING_THUMBPRINT + '"})'
          $Source = $Source.Replace($Marker, $Replacement)
          [IO.File]::WriteAllText(
              $UpdaterPath,
              $Source,
              [Text.UTF8Encoding]::new($false)
          )
          python -c "import os, pyos_updater; assert os.environ['PYOS_SIGNING_THUMBPRINT'] in pyos_updater._trusted_authenticode_thumbprints()"

      - name: Build Windows executable
        shell: pwsh
        run: |
          $Python = (Get-Command python -CommandType Application |
              Select-Object -First 1).Source
          .\build_pyos.ps1 `
              -PythonPath $Python `
              -Version $env:PYOS_FILE_VERSION `
              -ProductVersion $env:PYOS_PRODUCT_VERSION

      - name: Sign Windows executable
        shell: pwsh
        env:
          PYOS_SIGNING_THUMBPRINT: ${{ steps.signing-certificate.outputs.thumbprint }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $SignTool = Get-ChildItem `
              "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
              Sort-Object FullName -Descending |
              Select-Object -First 1
          if ($null -eq $SignTool) {
              throw "A Windows SDK signtool.exe installation is required."
          }
          $Executable = Join-Path $env:GITHUB_WORKSPACE "dist\pyOS-Setup.exe"
          & $SignTool.FullName sign /sha1 $env:PYOS_SIGNING_THUMBPRINT /s My `
              /fd SHA256 /tr "http://timestamp.digicert.com" /td SHA256 /v $Executable
          if ($LASTEXITCODE -ne 0) {
              throw "signtool failed with exit code $LASTEXITCODE."
          }
          & $SignTool.FullName verify /pa /all /v $Executable
          if ($LASTEXITCODE -ne 0) {
              throw "signtool verification failed with exit code $LASTEXITCODE."
          }

          $Hash = (Get-FileHash -LiteralPath $Executable -Algorithm SHA256).Hash.ToLowerInvariant()
          "$Hash  pyOS-Setup.exe" | Set-Content -LiteralPath "$Executable.sha256" -Encoding ASCII

      - name: Verify signed release
        shell: pwsh
        run: |
          $Python = (Get-Command python -CommandType Application |
              Select-Object -First 1).Source

          $Executable = Join-Path $env:GITHUB_WORKSPACE "dist\pyOS-Setup.exe"
          $ExpectedHash = ((Get-Content -LiteralPath "$Executable.sha256" -Raw) `
              -split '\s+')[0]
          $ActualHash = (Get-FileHash -LiteralPath $Executable -Algorithm SHA256).Hash
          if ($ExpectedHash -ne $ActualHash) {
              throw "The signed executable does not match its SHA-256 manifest."
          }

      - name: Upload signed release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pyOS-${{ github.ref_name }}-windows
          path: |
            dist/pyOS-Setup.exe
            dist/pyOS-Setup.exe.sha256
          if-no-files-found: error
          compression-level: 0

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
              "dist/pyOS-Setup.exe" `
              "dist/pyOS-Setup.exe.sha256" `
              --repo $env:GITHUB_REPOSITORY `
              --verify-tag `
              --generate-notes `
              --title "pyOS $env:GITHUB_REF_NAME"

      - name: Remove imported signing certificate
        if: always()
        shell: pwsh
        env:
          PYOS_SIGNING_THUMBPRINT: ${{ steps.signing-certificate.outputs.thumbprint }}
        run: |
          if ($env:PYOS_SIGNING_THUMBPRINT -match '^[0-9A-Fa-f]{40}$') {
              Remove-Item -LiteralPath `
                  "Cert:\CurrentUser\My\$env:PYOS_SIGNING_THUMBPRINT" `
                  -Force -ErrorAction SilentlyContinue
          }
