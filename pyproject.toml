[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-config --strict-markers"
testpaths = ["tests"]
python_files = ["test_*.py"]
norecursedirs = [
    ".git",
    ".idea",
    ".obsidian",
    ".pytest_cache",
    ".venv",
    "build",
    "dist",
]

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".git",
    ".idea",
    ".obsidian",
    ".pytest_cache",
    ".venv",
    "build",
    "dist",
]

[tool.ruff.lint]
# Establish a release-blocking correctness baseline without forcing a wholesale
# style rewrite of the existing GUI and CLI in the same change.
select = ["E9", "F63", "F7", "F82"]

